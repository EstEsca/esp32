; Session 0: Project bootstrap
; 목표는 ESP32-S3 보드 + Arduino 프레임워크가 잘 잡히는지 확인하는 것 뿐.
; TFT_eSPI 빌드 플래그는 Session 1a(Display)에서 처음 활성화한다.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; N8R8: Octal PSRAM 활성화
board_build.arduino.memory_type = qio_opi

monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
