; PlatformIO 보일러플레이트 — 세션마다 복사해서 조정.
; 핀 번호는 ../../hardware/pinout.md 참고.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; N8R8: Octal PSRAM 활성화
board_build.arduino.memory_type = qio_opi

monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    ; --- TFT_eSPI 핀 (사용하는 세션에서만 주석 해제) ---
    ; -DUSER_SETUP_LOADED=1
    ; -DILI9341_DRIVER=1
    ; -DTFT_WIDTH=240
    ; -DTFT_HEIGHT=320
    ; -DTFT_MISO=-1
    ; -DTFT_MOSI=11
    ; -DTFT_SCLK=12
    ; -DTFT_CS=10
    ; -DTFT_DC=9
    ; -DTFT_RST=14
    ; -DTFT_BL=21
    ; -DSPI_FREQUENCY=40000000

lib_deps =
    ; bodmer/TFT_eSPI    ; 디스플레이를 쓰는 세션에서만
